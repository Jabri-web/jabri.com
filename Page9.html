body{background:#0a0a0a;color:#e0e0e0;font-family:Arial,sans-serif;padding:20px;text-align:center}
.topbar{border:2px solid #333;border-radius:8px;padding:8px 15px;display:flex;align-items:center;justify-content:space-between;margin:0 auto 30px;max-width:500px}

.arrow.right{right:-40px}

.btn:hover{background:#4dc3ff}
.uploads{border:2px solid #444;border-radius:12px;padding:20px;margin:30px auto;max-width:500px;text-align:left}
.uploads h3{color:#6ae3ff;margin-bottom:15px;text-align:center}
table{width:100%;border-collapse:collapse}
th{color:#aaa;font-size:13px;text-align:left;padding:8px;border-bottom:1px solid #333}
td{padding:12px 8px;border-bottom:1px solid #222;font-size:14px}
.open-btn{background:#6ae3ff;color:#000;border:none;padding:5px 12px;border-radius:4px;font-size:12px;cursor:pointer}
