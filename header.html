<!-- ====== LANGUAGE FUNCTIONS ====== -->
<script>
// Update head language - uses document.documentElement.lang for consistency with footer
function updateHeadLang() {
    const isEnglish = document.documentElement.lang === 'en';
    console.log('🔄 updateHeadLang called, isEnglish:', isEnglish);
    
    // Update title
    const title = document.querySelector('title');
    if (title) {
        const newTitle = isEnglish ? title.getAttribute('data-en') : title.getAttribute('data-ar');
        if (newTitle) {
            title.textContent = newTitle;
            console.log('✅ Title updated to:', newTitle.substring(0, 50) + '...');
        }
    }
    
    // Update meta descriptions
    document.querySelectorAll('.meta-desc, .og-title, .og-desc, .tw-title, .tw-desc').forEach(el => {
        if (!el) return;
        const newContent = isEnglish ? el.getAttribute('data-en') : el.getAttribute('data-ar');
        if (newContent) {
            el.setAttribute('content', newContent);
        }
    });
    
    console.log('✅ Head meta tags updated');
}

// Expose globally
window.updateHeadLang = updateHeadLang;

// Main toggle language function
window.toggleLang = function() {
    const isEnglish = document.documentElement.lang === 'en';
    const newLang = isEnglish ? 'ar' : 'en';
    console.log('🔄 toggleLang called, switching to:', newLang);
    
    // Update HTML lang and dir
    document.documentElement.lang = newLang;
    document.documentElement.dir = newLang === 'ar' ? 'rtl' : 'ltr';
    
    // Update body class
    document.body.classList.remove('ar', 'en');
    document.body.classList.add(newLang);
    
    // Store preference
    localStorage.setItem('preferred-language', newLang);
    
    // Update head
    if (typeof updateHeadLang === 'function') {
        updateHeadLang();
    }
    
    // Update footer
    if (typeof updateFooterLang === 'function') {
        updateFooterLang();
    }
    
    // Update button states
    const langAr = document.getElementById('lang-ar');
    const langEn = document.getElementById('lang-en');
    if (langAr) langAr.classList.toggle('active', newLang === 'ar');
    if (langEn) langEn.classList.toggle('active', newLang === 'en');
    
    console.log('✅ Language switched to:', newLang);
};

// Load saved language on DOM ready
document.addEventListener('DOMContentLoaded', function() {
    const savedLang = localStorage.getItem('preferred-language') || 'ar';
    console.log('🌐 DOM loaded, saved language:', savedLang);
    
    // Set language
    document.documentElement.lang = savedLang;
    document.documentElement.dir = savedLang === 'ar' ? 'rtl' : 'ltr';
    document.body.classList.add(savedLang);
    
    // Update head
    if (typeof updateHeadLang === 'function') {
        updateHeadLang();
    }
    
    // Update footer
    if (typeof updateFooterLang === 'function') {
        updateFooterLang();
    }
    
    // Update button states
    const langAr = document.getElementById('lang-ar');
    const langEn = document.getElementById('lang-en');
    if (langAr) langAr.classList.toggle('active', savedLang === 'ar');
    if (langEn) langEn.classList.toggle('active', savedLang === 'en');
    
    console.log('🎉 Language initialized to:', savedLang);
});
</script>
