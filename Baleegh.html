<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>م. بليغ عبدالله الجبري | Eng. Baleegh Al-Jabri</title>
<style>
body{font-family:'Tahoma','Segoe UI',Arial,sans-serif;background:#0a0a0f;color:#e8e8f0;text-align:center;padding:40px 20px;margin:0;transition:0.3s}
body.en{direction:ltr}

/* زر اللغة ثابت */
.lang-btn{position:fixed;top:15px;left:15px;background:#6ae3ff;border:none;color:#0a0a0f;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:bold;font-size:14px;z-index:9999;box-shadow:0 4px 10px rgba(106,227,255,0.4)}
.lang-btn:hover{background:#4dd4ff}

.profile-img{width:140px;height:140px;border-radius:50%;border:4px solid #6ae3ff;object-fit:cover;margin-bottom:15px;background:#1a1a1a}

.offline-badge{background:#ff3333;color:#fff;padding:10px;border-radius:8px;margin:20px auto;max-width:300px;font-weight:bold;font-size:13px}

h2{color:#6ae3ff;margin:10px 0 30px 0;font-size:1.4rem}

.btn{display:block;width:80%;max-width:400px;margin:12px auto;padding:14px 20px;background:#14141f;color:#e8e8f0;text-decoration:none;border:1px solid #1f1f2e;border-radius:10px;font-size:16px;font-weight:600;transition:0.2s;line-height:1.4}
.btn:hover{background:#1f1f2e;border-color:#6ae3ff;color:#6ae3ff;transform:translateY(-2px)}
.btn.exit{background:#2a0f0f;border-color:#d62828;color:#ff6b6b}
.btn.exit:hover{background:#d62828;color:#fff}

.en-text{font-size:16px;display:block}
.ar-text{font-size:0.95rem;opacity:0.8;margin-top:3px;display:block}
body.en .ar-text{display:block}
body:not(.en) .en-text{display:block}

.ar,.en{display:inline}
body.en .ar{display:none}
body:not(.en) .en{display:none}
</style>
<script>
function toggleLang(){
  document.body.classList.toggle('en');
  document.documentElement.dir=document.body.classList.contains('en')?'ltr':'rtl';
  document.documentElement.lang=document.body.classList.contains('en')?'en':'ar';
  localStorage.setItem('lang',document.body.classList.contains('en')?'en':'ar');
}
window.onload=function(){
  if(localStorage.getItem('lang')==='en')document.body.classList.add('en');
}
</script>
</head>
<body>

<button class="lang-btn" onclick="toggleLang()">
  <span class="ar">EN</span>
  <span class="en">عربي</span>
</button>

<div class="offline-badge">

  <span class="en">✓ Works Offline</span>
</div>

<img src="Image/Baleegh.png" alt="Baleegh" class="profile-img" onerror="this.style.display='none'">

<h2>

</h2>

</body>
</html>
