        * {

            flex-direction: column;

        /* Language Switch Button */
        .language-switch {
            position: fixed;
            top: 20px;
            z-index: 1000;
            display: flex;
            gap: 4px;
            background: #1a1a32;
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #2a2a4e;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        body.ar .language-switch {
            left: 20px;
        }
        
        body.en .language-switch {
            right: 20px;
        }
        
        .language-switch button {
            background: none;
            border: none;
            color: #8888bb;
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .language-switch button:hover {
            color: #d0d0ea;
            background: #2a2a4e;
        }
        
        .language-switch button.active {
            background: #6ae3ff;
            color: #0b0b16;
        }
        
        .language-switch button.active:hover {
            background: #5ad0f0;
        }
