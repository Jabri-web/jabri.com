<!-- سكربت يقرأ لغة الصفحة -->
<script>
  function updateFooterLang() {
    const htmlLang = document.documentElement.lang; // يقرأ ar او en من <html lang="ar">
    const isArabic = htmlLang.startsWith('ar');
    
    // تغيير الاتجاه
    document.getElementById('site-footer').dir = isArabic ? "rtl" : "ltr";
    
    // تغيير العناوين
    document.getElementById('searchTitle').innerHTML = isArabic ?
      "<strong>🔍 البحث عن الباحث:</strong>" :
      "<strong>🔍 Search for Researcher:</strong>";
    
    document.getElementById('copyright').innerHTML = isArabic ?
      "© 2026 م/ عبدالله محمد ناصر الجبري - جميع الحقوق محفوظة" :
      "© 2026 Eng. Abdulla Mohammed Nasser Al-Jabri - All Rights Reserved";
    
    // تغيير كل النصوص
    document.querySelectorAll('#site-footer .txt').forEach(el => {
      el.textContent = isArabic ? el.getAttribute('data-ar') : el.getAttribute('data-en');
    });
  }
  
  // شغل اول ما الصفحة تحمل
  document.addEventListener('DOMContentLoaded', updateFooterLang);
  
  // لو زر اللغة عندك بيغير html lang بدون اعادة تحميل، استدعي updateFooterLang() بعد ما تغير اللغة
</script>
